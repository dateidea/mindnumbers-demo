      <div class="mn-hint-card" id="mn-hint-record" onclick="mnGo('record')"><h4><span class="mn-hint-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></span> Record</h4></div>
      <div class="mn-hint-card" id="mn-hint-meds" onclick="mnGo('meds')"><h4><span class="mn-hint-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5 1.5H8A6.5 6.5 0 0 0 8 14.5h8A6.5 6.5 0 0 0 16 1.5h-2.5"/><line x1="9" y1="8" x2="15" y2="8"/></svg></span> Meds</h4></div>
      <div class="mn-hint-card" id="mn-hint-more" onclick="mnGo('more')"><h4><span class="mn-hint-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></span> More</h4></div>
    </div>
  </div>
</section>

<script>
  // ===== MN_ASSETS — paste a URL between the quotes to swap any image. =====
  // Or, easier: add an Image Block to this page with ALT TEXT matching the
  // key (e.g. alt="sleep-details"). The demo will automatically use it.
  var MN_ASSETS = {
    'dashboard-main':          'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/dashboard-main.png',
    'dashboard-my-input':      'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/dashboard-my-input.png',
    'mood-and-speech-details': 'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/mood-and-speech-details.png',
    'sleep-details':           'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/sleep-details.png',
    'activity-details':        'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/activity-details.png',
    'routine-details':         'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/routine-details.png',
    'episodes-list':           'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/episodes-list.png',
    'trends-tab':              'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/trends-tab.png',
    'more-tab':                'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/more-tab.png',
    'record-tab':              'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/record-tab.png',
    'voice-recording':         'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/voice-recording.png',
    'meds-tab-taken':          'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/meds-tab-taken.png',
    'meds-tab-prescription':   'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/meds-tab-prescription.png',
    'nav-home-active':         'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/nav-home-active.png',
    'nav-home-inactive':       'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/nav-home-inactive.png',
    'nav-trends-active':       'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/nav-trends-active.png',
    'nav-trends-inactive':     'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/nav-trends-inactive.png',
    'nav-record-active':       'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/nav-record-active.png',
    'nav-record-inactive':     'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/nav-record-inactive.png',
    'nav-meds-active':         'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/nav-meds-active.png',
    'nav-meds-inactive':       'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/nav-meds-inactive.png',
    'nav-more-active':         'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/nav-more-active.png',
    'nav-more-inactive':       'https://dateidea.github.io/mindnumbers-demo/MindNumbers%20Interactive%20Phone%20items/nav-more-inactive.png'
  };

  // Override from sibling Image Blocks. Match by alt text (case-insensitive).
  function mnApplyImageBlockOverrides() {
    var imageBlocks = document.querySelectorAll('.sqs-block-image, [data-block-type="5"]');
    imageBlocks.forEach(function(block) {
      var img = block.querySelector('img');
      if (!img) return;
      var alt = (img.getAttribute('alt') || '').trim().toLowerCase();
      if (!alt) return;
      // Try exact match
      if (MN_ASSETS.hasOwnProperty(alt)) {
        var realSrc = img.currentSrc || img.getAttribute('data-src') || img.src;
        if (realSrc && realSrc.indexOf('data:') !== 0) {
          MN_ASSETS[alt] = realSrc;
          block.style.display = 'none';
        }
      }
    });
  }

  function mnFillAssets() {
    document.querySelectorAll('.mn-demo-section [data-asset]').forEach(function(el) {
      var key = el.getAttribute('data-asset');
      if (MN_ASSETS[key]) el.src = MN_ASSETS[key];
    });
  }

  function mnInit() {
    mnApplyImageBlockOverrides();
    mnFillAssets();
    // Re-scan once Squarespace finishes loading deferred image srcs
    setTimeout(function() { mnApplyImageBlockOverrides(); mnFillAssets(); }, 800);
    setTimeout(function() { mnApplyImageBlockOverrides(); mnFillAssets(); }, 2500);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', mnInit);
  } else {
    mnInit();
  }

  var mnCurrent = 'dash';
  var mnHistory = ['dash'];

  function mnBack() {
    mnGo('dash');
  }

  function mnGo(id) {
    if (id === mnCurrent) return;
    var isBack = false;
    var histIdx = mnHistory.indexOf(id);
    if (histIdx !== -1 && histIdx < mnHistory.length - 1) {
      isBack = true;
      mnHistory = mnHistory.slice(0, histIdx + 1);
    } else {
      mnHistory.push(id);
    }
    var oldEl = document.getElementById('mn-' + mnCurrent);
    var newEl = document.getElementById('mn-' + id);
    if (oldEl) {
      oldEl.classList.remove('mn-active');
      oldEl.classList.add(isBack ? 'mn-exit-back' : 'mn-exit');
      setTimeout(function() { oldEl.classList.remove('mn-exit', 'mn-exit-back', 'mn-enter-back'); }, 400);
    }
    if (newEl) {
      if (isBack) { newEl.classList.add('mn-enter-back'); newEl.offsetHeight; }
      newEl.classList.add('mn-active');
      if (isBack) { setTimeout(function() { newEl.classList.remove('mn-enter-back'); }, 400); }
      var scrollArea = newEl.querySelector('.mn-img-scroll');
      if (scrollArea) scrollArea.scrollTop = 0;
    }
    mnCurrent = id;
    document.querySelectorAll('.mn-demo-section .mn-hint-card').forEach(function(c) { c.classList.remove('active-hint'); });
    var hint = document.getElementById('mn-hint-' + id);
    if (hint) hint.classList.add('active-hint');
    if (id === 'dash' || id === 'input') {
      var dashHint = document.getElementById('mn-hint-dash');
      if (dashHint) dashHint.classList.add('active-hint');
    }
    var globalNav = document.querySelector('.mn-demo-section .mn-nav-global');
    if (globalNav) {
      globalNav.querySelectorAll('.mn-nav-item').forEach(function(item) { item.classList.remove('mn-nav-on'); });
      var navMap = { 'trends': 'trends', 'record': 'record', 'voice-rec': 'record', 'meds': 'meds', 'meds-rx': 'meds', 'more': 'more' };
      var navKey = navMap[id] || 'home';
      var activeItem = globalNav.querySelector('.mn-nav-item[data-nav="' + navKey + '"]');
      if (activeItem) activeItem.classList.add('mn-nav-on');
    }
  }
</script>
